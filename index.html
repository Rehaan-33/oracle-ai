<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORACLE | Core Intelligence</title>
    <style>
        :root { --oracle-cyan: #00f2ff; --oracle-black: #020202; --accent: var(--oracle-cyan); --border: rgba(0, 242, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--oracle-black); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #oracle-nav { background: #080808; border-bottom: 2px solid var(--accent); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .oracle-logo { width: 40px; height: 40px; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; filter: drop-shadow(0 0 10px var(--accent)); } }
        #core-container { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 300px; background: #050505; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .module { background: #000; border: 1px solid var(--border); padding: 15px; border-top: 2px solid var(--accent); }
        .label { font-size: 9px; color: var(--accent); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); margin-bottom: 20px; background: rgba(255,255,255,0.02); }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 4px; font-size: 14px; }
        .user { align-self: flex-end; border: 1px solid var(--accent); color: var(--accent); }
        .bot { align-self: flex-start; background: #111; border-left: 2px solid var(--accent); }
        input { width: 100%; background: #000; border: 1px solid var(--accent); color: #fff; padding: 8px; margin-top: 5px; outline: none; }
        button { background: var(--accent); border: none; color: #000; padding: 10px; cursor: pointer; font-weight: 900; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <nav id="oracle-nav">
        <div style="display:flex; align-items:center; gap:15px;">
            <svg class="oracle-logo" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="#00f2ff" stroke-width="2"/><circle cx="50" cy="50" r="20" fill="none" stroke="#00f2ff" stroke-width="6"/></svg>
            <h1 style="letter-spacing:12px; text-transform:uppercase;">Oracle AI</h1>
        </div>
        <div id="status" style="font-size: 9px; color: #333;">CONNECTION: LOCKED</div>
    </nav>
    <div id="core-container">
        <aside id="sidebar">
            <div class="module">
                <span class="label">Access Key</span>
                <input type="password" id="keyInput" placeholder="API Key (sk-or-...)">
                <input type="password" id="passInput" placeholder="Clearance Code (33c)" style="margin-top:10px;">
                <button id="authBtn">AUTHENTICATE HUB</button>
            </div>
        </aside>
        <main style="flex: 1; display: flex; flex-direction: column; padding: 20px;">
            <div id="chat-window"><div class="msg bot">Oracle online. Enter credentials in the access module.</div></div>
            <div style="display: flex; gap: 10px;"><input type="text" id="userInput" style="flex:1;"><button id="sendBtn" style="width:100px; margin-top:5px;">EXECUTE</button></div>
        </main>
    </div>
    <script>
        let KEY = ""; let OK = false;
        document.getElementById('authBtn').onclick = () => {
            const k = document.getElementById('keyInput').value; const p = document.getElementById('passInput').value;
            if(p === '33c' && k.startsWith('sk-or-')) { KEY=k; OK=true; document.getElementById('status').innerText="CONNECTION: ESTABLISHED"; document.getElementById('status').style.color="#00f2ff"; alert("HUB AUTHENTICATED"); }
            else { alert("ACCESS DENIED"); }
        };
        async function send() {
            if(!OK) return; const val = document.getElementById('userInput').value;
            if(!val) return; const chat = document.getElementById('chat-window');
            const u = document.createElement('div'); u.className='msg user'; u.innerText=val; chat.appendChild(u);
            const b = document.createElement('div'); b.className='msg bot'; b.innerText='Calculating...'; chat.appendChild(b);
            document.getElementById('userInput').value='';
            const r = await fetch("https://openrouter.ai", {
                method:"POST", headers:{"Authorization":`Bearer ${KEY}`,"Content-Type":"application/json"},
                body:JSON.stringify({"model":"google/gemini-2.0-flash-lite-preview-02-05:free","messages":[{"role":"user","content":val}]})
            });
            const d = await r.json(); b.innerText = d.choices.message.content;
            chat.scrollTop = chat.scrollHeight;
        }
        document.getElementById('sendBtn').onclick = send;
    </script>
</body>
</html>
